# RoboTwin Easy (with actions) — per-task N-episode finetune splits.
#
# Layout (from scripts/preprocess_data.sh):
#     <finetune_root>/<task>/<N>_episodes/<ep>/{frames,actions_raw}.npy
#
# run_finetune.sh exports FINETUNE_ROOT/TASK/SPLIT for each run so one
# hydra config handles every (task, N) combination.
#
# frameskip=4 matches sdlwm (configs/default.yaml). Action encoder input
# width = frameskip * action_dim = 4 * 14 = 56, matching the pretrained
# ckpt — do not change unless the pretrain was done differently.

pixel_preprocessor: none

dataset:
  _target_: robotwin_dataset.RoboTwinDataset
  data_root: ${oc.env:FINETUNE_ROOT}/${oc.env:FT_TASK}/${oc.env:FT_SPLIT}_episodes
  num_steps: ${eval:'${wm.num_preds} + ${wm.history_size}'}
  frameskip: 4
  keys_to_load:
    - pixels
    - action
  keys_to_cache:
    - action
  require_raw_actions: true
